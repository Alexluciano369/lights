<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | CleanGutters Lighting</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/logo-new.jpg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 600px; }
    .logo-img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      margin-bottom: 2rem;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
    h1 {
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4db8ff 0%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; }
    p { color: rgba(255,255,255,0.75); font-size: 1.1rem; line-height: 1.7; margin-bottom: 2.5rem; }
    .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      color: #1a1a2e;
      padding: 0.9rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
      transition: all 0.3s ease;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
    .btn-secondary {
      background: rgba(77, 184, 255, 0.15);
      color: #ffffff;
      padding: 0.9rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      border: 2px solid #4db8ff;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover { background: rgba(77, 184, 255, 0.3); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo-new.jpg" alt="CleanGutters Lighting" class="logo-img" />
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let us help you find what you need.</p>
    <div class="btn-group">
      <a href="/" class="btn-primary">Go Home</a>
      <a href="tel:856-874-6640" class="btn-secondary">Call 856-874-6640</a>
    </div>
  </div>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c5f8d"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffb800"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#ring)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#c0c5cc" stroke-width="2"/>
  <!-- Stylized C with gold gutter-like arc -->
  <path d="M 44 22 A 14 14 0 1 0 44 42" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <!-- Downspout accent dot -->
  <circle cx="44" cy="32" r="2.5" fill="#ffd700"/>
